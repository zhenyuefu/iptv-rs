[Settings]
# Core switches
open_update = True
open_local = True
open_subscribe = True
open_auto_disable_source = True
open_history = True
open_unmatch_category = False
open_empty_category = False
open_update_time = True
open_url_info = False
open_epg = True
open_m3u_result = True
open_service = True
update_time_position = top

# Service / Docker compatible settings
update_startup = True
update_interval = 12
nginx_http_port = 8080
public_scheme = http
public_domain = 127.0.0.1
public_port = 80

# Paths
source_file = config/demo.txt
local_source_list_file = config/local_sources.txt
subscribe_file = config/subscribe.txt
epg_file = config/epg.txt
alias_file = config/alias.txt
blacklist_file = config/blacklist.txt
whitelist_file = config/whitelist.txt
final_file = output/result.txt
epg_output_file = output/epg/epg.xml

# Aggregation
urls_limit = 5
request_timeout = 10
default_user_agent = iptv-rs/0.1

# Filtering / ordering without speed testing.
ipv_type = all
ipv_type_prefer =
origin_type_prefer =
iptv_source_prefer =
# 当前可访问的运营商 IPTV 标签。只过滤显式写了 IPTV= 的源，普通网络源不要写 IPTV。
iptv_source_filter =

# Channel logo. Local logo files are always preferred.
logo_dir = config/logo
local_logo_base_url =
logo_url = https://www.xn--rgv465a.top/tvlogo
logo_type = png
