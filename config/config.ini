[Settings]
# Core switches
open_local = True
open_subscribe = True
open_epg = True
open_m3u_result = True
open_service = True

# Service / Docker compatible settings
update_startup = True
update_interval = 12
nginx_http_port = 8080
public_scheme = http
public_domain = 127.0.0.1
public_port = 80

# Paths
source_file = config/demo.txt
local_file = config/local.txt
local_dir = config/local
subscribe_file = config/subscribe.txt
epg_file = config/epg.txt
final_file = output/result.txt
epg_output_file = output/epg/epg.xml

# Aggregation
urls_limit = 5
request_timeout = 10
default_user_agent = iptv-rs/0.1

# Channel logo. Local logo files are always preferred.
logo_dir = config/logo
local_logo_base_url =
logo_url = https://www.xn--rgv465a.top/tvlogo
logo_type = png
